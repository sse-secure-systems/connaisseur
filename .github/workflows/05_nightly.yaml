name: nightly

on:
  schedule:
    - cron: "30 1 * * *"

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  ci:
    uses: ./.github/workflows/100_ci.yml
    permissions:
      packages: write
      contents: write
      id-token: write
      security-events: write
      actions: read
      checks: read
      deployments: read
      issues: read
      discussions: read
      pages: read
      pull-requests: read
      repository-projects: read
      statuses: read
      attestations: read
    secrets: inherit
    with:
      unit_tests: "none"
      sast: "none"
      docs: "none"
      integration_tests: "none"
      output_type: "table"

  cleanup-registry:
    uses: ./.github/workflows/201_cleanup-registry.yml
    needs: [ci]
    secrets: inherit
