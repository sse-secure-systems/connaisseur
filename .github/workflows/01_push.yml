name: push

permissions: {}

on:
  push:
    branches:
      - master
      - develop

defaults:
  run:
    shell: bash

jobs:
  ci:
    uses: ./.github/workflows/100_ci.yml
    permissions:
      packages: write
      contents: write
      id-token: write
      security-events: write
      actions: read
      checks: read
      deployments: read
      issues: read
      discussions: read
      pages: read
      pull-requests: read
      repository-projects: read
      statuses: read
      attestations: read
    secrets: inherit
